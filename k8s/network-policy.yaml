# Default-deny all ingress and egress for bot-runner pods in the bots namespace.
# Bots must not reach the network (no exfiltration, no calling external services).
# The dispatcher (same namespace) and the web pod (in `platform`) are allowed
# to reach bot-runner pods on port 8080 (turn HTTP API).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bot-isolation
  namespace: bots
spec:
  podSelector:
    matchLabels:
      app: bot-runner
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dispatcher
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app: web
      ports:
        - port: 8080
  egress: []
