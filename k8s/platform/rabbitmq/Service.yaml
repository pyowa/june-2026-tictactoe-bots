apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: platform
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30002
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30001
