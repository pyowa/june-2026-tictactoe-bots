apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-scheduler
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: match-scheduler
  template:
    metadata:
      labels:
        app: match-scheduler
    spec:
      containers:
        - name: match-scheduler
          image: pyowa/match-scheduler:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: RABBITMQ_URL
          resources:
            limits:
              cpu: "250m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
