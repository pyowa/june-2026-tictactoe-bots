apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: bots
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
    spec:
      serviceAccountName: dispatcher
      containers:
        - name: dispatcher
          image: pyowa/dispatcher:latest
          imagePullPolicy: Never  # loaded via `kind load docker-image`
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: dispatcher
                  key: RABBITMQ_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dispatcher
                  key: DATABASE_URL
            - name: POD_TIMEOUT
              value: "60"
          ports:
            - containerPort: 8080
              name: health
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
