apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: bots
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
    spec:
      serviceAccountName: dispatcher
      containers:
        - name: dispatcher
          image: pyowa/dispatcher:latest
          imagePullPolicy: Never  # loaded via `kind load docker-image`
          env:
            - name: RABBITMQ_URL
              value: amqp://guest:guest@host.docker.internal:5672/
            - name: DATABASE_URL
              value: postgresql+asyncpg://ttt:ttt@host.docker.internal:5432/ttt
            - name: POD_TIMEOUT
              value: "60"
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
