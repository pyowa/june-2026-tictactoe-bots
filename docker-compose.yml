services:
  # Mutation testing via mutmut. Only starts when explicitly requested:
  #   docker compose --profile mutmut run --rm mutmut
  # Connects to Postgres running in the kind cluster (exposed on host port 5432
  # via NodePort 30003). Requires `uv run poe kind-up && uv run poe kind-load`.
  mutmut:
    profiles: [mutmut]
    build:
      context: .
      target: test-runner
      args:
        PY_VERSION: "3.13"
    environment:
      PGHOST: host.docker.internal
      PGPORT: "5432"
      PGUSER: ttt
      PGPASSWORD: ttt
      PGDATABASE: ttt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web:/app/web
      - ./runner:/app/runner
      - ./db:/app/db
      - ./entities:/app/entities
      - ./messaging:/app/messaging
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./mutants:/app/mutants
    command: ["uv", "run", "mutmut", "run", "--max-children", "1"]
    restart: "no"
