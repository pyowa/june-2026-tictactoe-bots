services:
  db:
    image: postgres:latest
    container_name: ttt-postgres
    environment:
      POSTGRES_USER: ttt
      POSTGRES_PASSWORD: ttt
      POSTGRES_DB: ttt
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ recommends mounting the parent dir so data lives in a
      # versioned subdirectory (enables in-place pg_upgrade later).
      - ttt-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttt -d ttt"]
      interval: 2s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ttt-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ttt-pgdata:
