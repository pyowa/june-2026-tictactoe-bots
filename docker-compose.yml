services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ttt
      POSTGRES_PASSWORD: ttt
      POSTGRES_DB: ttt
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ recommends mounting the parent dir so data lives in a
      # versioned subdirectory (enables in-place pg_upgrade later).
      - ttt-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttt -d ttt"]
      interval: 2s
      timeout: 3s
      retries: 20

  # Mutation testing via mutmut. Only starts when explicitly requested:
  #   docker compose --profile mutmut run --rm mutmut
  # Depends on `db` (session test hits a real DB). No RabbitMQ dependency —
  # tests mock the broker.
  mutmut:
    profiles: [mutmut]
    build:
      context: .
      target: test-runner
      args:
        PY_VERSION: "3.13"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ttt
      PGPASSWORD: ttt
      PGDATABASE: ttt
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./web:/app/web
      - ./runner:/app/runner
      - ./db:/app/db
      - ./entities:/app/entities
      - ./messaging:/app/messaging
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./mutants:/app/mutants
    command: ["uv", "run", "mutmut", "run", "--max-children", "1"]
    restart: "no"

volumes:
  ttt-pgdata:
